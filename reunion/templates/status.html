<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参加状況</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f7; }
    .chart-wrap { position: relative; max-width: 180px; margin: 0 auto; }
    .chart-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none;
    }
    .chart-center .num { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .chart-center .lbl { font-size: 0.65rem; color: #6c757d; }
    .legend-list { list-style: none; padding: 0; margin: 0.6rem 0 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 14px; }
    .legend-list li { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-val { font-weight: 600; }

    .cls-btn {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
      width: 100%; padding: 10px 14px; font-size: 0.88rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      text-align: left;
    }
    .cls-btn:hover { background: #f0f0f5; }
    .cls-btn.active { background: #e8f0fe; border-color: #0d6efd; color: #0d6efd; }
    .cls-btn .cnt { font-size: 0.72rem; color: #888; font-weight: 400; }
    .cls-btn.active .cnt { color: #6ea0ff; }

    .cls-body {
      display: none; background: #fff; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08); overflow: hidden;
    }
    .cls-body.show { display: block; }

    .person-row { display: flex; align-items: center; padding: 7px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.875rem; }
    .person-row:last-child { border-bottom: none; }

    .section-label { font-size: 0.78rem; font-weight: 700; color: #6c757d; letter-spacing: .05em; margin: 16px 0 6px; }

    .teacher-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
  </style>
</head>
<body>
<div class="container py-4" style="max-width: 540px;">

  <p class="fw-bold mb-3" style="font-size:1.05rem;">参加状況 <span class="text-muted fw-normal small">（{{ total }}名）</span></p>

  <!-- Radio -->
  <div class="btn-group w-100 mb-4" role="group">
    <input type="radio" class="btn-check" name="ft" id="r-prov" value="prov" checked>
    <label class="btn btn-outline-primary" for="r-prov">仮出欠</label>
    <input type="radio" class="btn-check" name="ft" id="r-final" value="final">
    <label class="btn btn-outline-primary" for="r-final">本出欠</label>
  </div>

  <!-- Chart -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body py-3">
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
        <div class="chart-center">
          <div class="num">{{ total }}</div>
          <div class="lbl">登録者数</div>
        </div>
      </div>
      <ul class="legend-list" id="legend"></ul>
    </div>
  </div>

  <!-- Students -->
  {% if sorted_classes %}
  <div class="section-label">生徒</div>
  <div class="d-flex flex-column gap-2 mb-3">
    {% for cls in sorted_classes %}
    <div>
      <button class="cls-btn" data-cls-idx="{{ loop.index0 }}">
        <span>{{ cls.label }}</span>
        <span class="cnt">{{ cls.people|length }}名</span>
      </button>
      <div class="cls-body" id="cls-body-{{ loop.index0 }}"></div>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Teachers -->
  {% if teachers %}
  <div class="section-label">先生</div>
  <div class="d-flex flex-column gap-2 mb-2">
    <button class="cls-btn" id="teacher-btn">
      <span>先生・その他</span>
      <span class="cnt">{{ teachers|length }}名</span>
    </button>
  </div>
  <div class="cls-body mb-4" id="teacher-body"></div>
  {% endif %}

  <p class="text-center text-muted mt-2" style="font-size:0.75rem;">このページは閲覧専用です</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
(function () {
  const PROV  = { attending: {{ prov_stats.attending }}, not_attending: {{ prov_stats.not_attending }}, undecided: {{ prov_stats.undecided }}, no_response: {{ prov_stats.no_response }} };
  const FINAL = { attending: {{ final_stats.attending }}, not_attending: {{ final_stats.not_attending }}, no_response: {{ final_stats.no_response }} };

  const CFG = {
    prov: {
      segs: [
        { key: 'attending',     label: '仮参加',   color: '#198754' },
        { key: 'not_attending', label: '仮不参加', color: '#adb5bd' },
        { key: 'undecided',     label: '未定',     color: '#0dcaf0' },
        { key: 'no_response',   label: '未回答',   color: '#ffc107' },
      ],
      badge: {
        attending:     ['bg-success',           '仮参加'],
        not_attending: ['bg-secondary',         '仮不参加'],
        undecided:     ['bg-info text-dark',    '未定'],
        no_response:   ['bg-warning text-dark', '未回答'],
      },
      data: PROV,
    },
    final: {
      segs: [
        { key: 'attending',     label: '本参加',   color: '#198754' },
        { key: 'not_attending', label: '本不参加', color: '#adb5bd' },
        { key: 'no_response',   label: '未回答',   color: '#ffc107' },
      ],
      badge: {
        attending:     ['bg-success',           '本参加'],
        not_attending: ['bg-secondary',         '本不参加'],
        no_response:   ['bg-warning text-dark', '未回答'],
      },
      data: FINAL,
    },
  };

  const CLASS_DATA = [
    {% for cls in sorted_classes %}
    { label: "{{ cls.label }}", people: [{% for p in cls.people %}{ name: "{{ p.name }}", prov: "{{ p.prov }}", final: "{{ p.final }}", prov_consent: {{ 'true' if p.prov_consent else 'false' }}, final_consent: {{ 'true' if p.final_consent else 'false' }} },{% endfor %}] },
    {% endfor %}
  ];

  const TEACHER_DATA = [{% for p in teachers %}{ name: "{{ p.name }} 先生", prov: "{{ p.prov }}", final: "{{ p.final }}", prov_consent: {{ 'true' if p.prov_consent else 'false' }}, final_consent: {{ 'true' if p.final_consent else 'false' }} },{% endfor %}];

  let currentType    = 'prov';
  let activeIdx      = null;
  let teacherOpen    = false;

  // Chart
  const chart = new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderWidth: 2, borderColor: '#fff', hoverOffset: 4 }] },
    options: { cutout: '65%', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } },
  });

  function applyBadges(type, container) {
    container.querySelectorAll('.person-row').forEach(row => {
      const st = row.dataset[type] || 'no_response';
      const [cls, lbl] = CFG[type].badge[st] || CFG[type].badge['no_response'];
      const b = row.querySelector('.person-badge');
      b.className = 'badge person-badge ms-2 ' + cls;
      b.textContent = lbl;
    });
  }

  function update(type) {
    currentType = type;
    const cfg = CFG[type];

    chart.data.labels                       = cfg.segs.map(s => s.label);
    chart.data.datasets[0].data            = cfg.segs.map(s => cfg.data[s.key] || 0);
    chart.data.datasets[0].backgroundColor = cfg.segs.map(s => s.color);
    chart.update();

    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    cfg.segs.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="legend-dot" style="background:${s.color}"></span>${s.label}<span class="legend-val">${cfg.data[s.key] || 0}</span>`;
      legend.appendChild(li);
    });

    // 開いているクラスを再描画（名前表示がconsentで変わるため）
    clsBtns.forEach((btn, idx) => {
      const b = document.getElementById('cls-body-' + idx);
      if (b && b.classList.contains('show')) {
        const cls = CLASS_DATA[idx];
        b.innerHTML = cls.people.map(p => {
          const showName = type === 'prov' ? p.prov_consent : p.final_consent;
          const displayName = showName ? p.name : '<span class="text-muted">非公開</span>';
          return `<div class="person-row" data-prov="${p.prov}" data-final="${p.final}">
            <span class="flex-grow-1">${displayName}</span>
            <span class="badge person-badge ms-2"></span>
          </div>`;
        }).join('');
        applyBadges(type, b);
      }
    });
    const teacherBody = document.getElementById('teacher-body');
    if (teacherBody && teacherBody.classList.contains('show')) {
      teacherBody.innerHTML = TEACHER_DATA.map(p => {
        const showName = type === 'prov' ? p.prov_consent : p.final_consent;
        const displayName = showName ? p.name : '<span class="text-muted">非公開</span>';
        return `<div class="person-row" data-prov="${p.prov}" data-final="${p.final}">
          <span class="flex-grow-1">${displayName}</span>
          <span class="badge person-badge ms-2"></span>
        </div>`;
      }).join('');
      applyBadges(type, teacherBody);
    }
  }

  // Class accordion (inline body per class)
  const clsBtns = document.querySelectorAll('.cls-btn');

  clsBtns.forEach((btn, idx) => {
    const body = document.getElementById('cls-body-' + idx);
    if (!body) return;

    btn.addEventListener('click', function () {
      const isOpen = body.classList.contains('show');

      // Close all
      clsBtns.forEach((b, i) => {
        b.classList.remove('active');
        const ob = document.getElementById('cls-body-' + i);
        if (ob) ob.classList.remove('show');
      });

      if (isOpen) return;

      const cls = CLASS_DATA[idx];
      body.innerHTML = cls.people.map(p => {
        const showName = currentType === 'prov' ? p.prov_consent : p.final_consent;
        const displayName = showName ? p.name : '<span class="text-muted">非公開</span>';
        return `<div class="person-row" data-prov="${p.prov}" data-final="${p.final}">
           <span class="flex-grow-1">${displayName}</span>
           <span class="badge person-badge ms-2"></span>
         </div>`;
      }).join('');
      applyBadges(currentType, body);
      body.classList.add('show');
      btn.classList.add('active');
      setTimeout(() => body.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    });
  });

  // Teacher accordion
  const teacherBtn  = document.getElementById('teacher-btn');
  const teacherBody = document.getElementById('teacher-body');
  if (teacherBtn) {
    teacherBtn.addEventListener('click', function () {
      teacherOpen = !teacherOpen;
      if (teacherOpen) {
        teacherBody.innerHTML = TEACHER_DATA.map(p => {
          const showName = currentType === 'prov' ? p.prov_consent : p.final_consent;
          const displayName = showName ? p.name : '<span class="text-muted">非公開</span>';
          return `<div class="person-row" data-prov="${p.prov}" data-final="${p.final}">
             <span class="flex-grow-1">${displayName}</span>
             <span class="badge person-badge ms-2"></span>
           </div>`;
        }).join('');
        applyBadges(currentType, teacherBody);
        teacherBody.classList.add('show');
        teacherBtn.classList.add('active');
        setTimeout(() => teacherBody.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      } else {
        teacherBody.classList.remove('show');
        teacherBtn.classList.remove('active');
      }
    });
  }

  // Radio
  document.querySelectorAll('input[name="ft"]').forEach(r => {
    r.addEventListener('change', function () { update(this.value); });
  });

  update('prov');
})();
</script>
</body>
</html>
